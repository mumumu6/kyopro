[tasks.cpp]
description = "必要ならコンパイルして実行"
alias = "r"
shell = "bash -c"
dir = "{{cwd}}"
quiet = true
usage = '''
arg "<src>" help="source file"
'''
run = '''
set -eu

SRC="$usage_src"
STEM="$(basename "${SRC%.*}")"
OUT_DIR="out"
BIN="${OUT_DIR}/${STEM}"

FLAGS=(
  -fsanitize=undefined,address
  -fno-sanitize-recover=all
  -fdiagnostics-color=always
  -Wall
  -Wextra
  -Wshadow
  -std=gnu++23
  -g
  -fno-omit-frame-pointer
)

mkdir -p "$OUT_DIR"

need_build=1

if [ -f "$BIN" ]; then
  need_build=0

  for dep in "$SRC" *.h *.hpp; do
    [ -e "$dep" ] || continue
    if [ ! "$BIN" -nt "$dep" ]; then
      need_build=1
      break
    fi
  done
fi

if [ "$need_build" -eq 1 ]; then
  echo "[build] $SRC -> $BIN"
  /usr/bin/g++-14 "${FLAGS[@]}" "$SRC" -o "$BIN"
else
  echo "[skip]"
fi

LLVM_SYMBOLIZER="$(command -v llvm-symbolizer || true)"
if [ -n "$LLVM_SYMBOLIZER" ]; then
  export ASAN_SYMBOLIZER_PATH="$LLVM_SYMBOLIZER"
fi
export ASAN_OPTIONS="abort_on_error=1:symbolize=1"
export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1"

LOG_FILE="$(mktemp -t mise-cpp-log.XXXXXX)"
trap 'rm -f "$LOG_FILE"' EXIT

set +e
"./$BIN" 2>&1 | tee "$LOG_FILE"
status=${PIPESTATUS[0]}
set -e

if [ "$status" -ne 0 ]; then
  err_line="$(grep -m1 -E '==[0-9]+==ERROR: |runtime error:' "$LOG_FILE" || true)"
  err_msg=""
  if [[ "$err_line" =~ ^==[0-9]+==ERROR:\ [^:]+:\ (.*)$ ]]; then
    err_msg="${BASH_REMATCH[1]}"
  elif [[ "$err_line" == *"runtime error:"* ]]; then
    err_msg="runtime error: ${err_line##*runtime error: }"
  fi

  hit_line="$(grep -m1 -Eo '/[^ ]+\.(c|cc|cpp|cxx|h|hh|hpp):[0-9]+(:[0-9]+)?' "$LOG_FILE" || true)"
  if [ -n "$hit_line" ] || [ -n "$err_msg" ]; then
    printf '\n\033[1;31m========== RUNTIME ERROR LOCATION ==========\033[0m\n'
    if [ -n "$err_msg" ]; then
      printf '\033[1;37merror:\033[0m \033[1;33m%s\033[0m\n' "$err_msg"
    fi
    if [ -n "$hit_line" ]; then
      printf '\033[1;37mat:\033[0m    \033[1;33m%s\033[0m\n' "$hit_line"
    fi
    printf '\033[1;31m============================================\033[0m\n'
  fi
fi

exit "$status"
'''
