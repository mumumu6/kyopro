[tasks.cpp]
description = "必要ならコンパイルして実行"
alias = "r"
shell = "bash -c"
dir = "{{cwd}}"
quiet = true
usage = '''
arg "[src]" help="source file"
'''
run = '''
set -eu

SRC="${usage_src:-}"
if [ -z "$SRC" ]; then
  if [ -t 0 ]; then
    ls
    read -r -p "source file (e.g. a.cpp): " SRC
  else
    echo "src is required (e.g. a.cpp)" >&2
    exit 1
  fi
fi

STEM="$(basename "${SRC%.*}")"
OUT_DIR="out"
BIN="${OUT_DIR}/${STEM}"

FLAGS=(
  -fsanitize=undefined,address
  -fno-sanitize-recover=all
  -fdiagnostics-color=always
  -Wall
  -Wextra
  -Wno-sign-compare
  -std=gnu++23
  -g
  -fno-omit-frame-pointer
)

mkdir -p "$OUT_DIR"

need_build=1

if [ -f "$BIN" ]; then
  need_build=0

  for dep in "$SRC" *.h *.hpp; do
    [ -e "$dep" ] || continue
    if [ ! "$BIN" -nt "$dep" ]; then
      need_build=1
      break
    fi
  done
fi

if [ "$need_build" -eq 1 ]; then
  echo "[build] $SRC -> $BIN"
  /usr/bin/g++-14 "${FLAGS[@]}" "$SRC" -o "$BIN"
else
  echo "[skip]"
fi

LLVM_SYMBOLIZER="$(command -v llvm-symbolizer || true)"
if [ -n "$LLVM_SYMBOLIZER" ]; then
  export ASAN_SYMBOLIZER_PATH="$LLVM_SYMBOLIZER"
fi
export ASAN_OPTIONS="abort_on_error=1:symbolize=1"
export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1"

LOG_FILE="$(mktemp -t mise-cpp-log.XXXXXX)"
trap 'rm -f "$LOG_FILE"' EXIT

set +e
"./$BIN" 2>&1 | tee "$LOG_FILE"
status=${PIPESTATUS[0]}
set -e

exit "$status"
'''

[tasks.cpp-build]
description = "必要ならコンパイルのみ（デバッグ用）"
alias = "cb"
shell = "bash -c"
dir = "{{cwd}}"
quiet = true
usage = '''
arg "[src]" help="source file"
'''
run = '''
set -eu

SRC="${usage_src:-}"
if [ -z "$SRC" ]; then
  if [ -t 0 ]; then
    ls
    read -r -p "source file (e.g. a.cpp): " SRC
  else
    echo "src is required (e.g. a.cpp)" >&2
    exit 1
  fi
fi

STEM="$(basename "${SRC%.*}")"
OUT_DIR="out"
BIN="${OUT_DIR}/${STEM}"

FLAGS=(
  -fsanitize=undefined,address
  -fno-sanitize-recover=all
  -fdiagnostics-color=always
  -Wall
  -Wextra
  -Wshadow
  -std=gnu++23
  -g
  -fno-omit-frame-pointer
)

mkdir -p "$OUT_DIR"

need_build=1

if [ -f "$BIN" ]; then
  need_build=0

  for dep in "$SRC" *.h *.hpp; do
    [ -e "$dep" ] || continue
    if [ ! "$BIN" -nt "$dep" ]; then
      need_build=1
      break
    fi
  done
fi

if [ "$need_build" -eq 1 ]; then
  echo "[build] $SRC -> $BIN"
  /usr/bin/g++-14 "${FLAGS[@]}" "$SRC" -o "$BIN"
else
  echo "[skip] $BIN is up to date"
fi
'''

[tasks.setup-abc]
description = "ABC の問題テンプレート a-f を生成(mise run abc 100)"
alias = "abc"
shell = "bash -c"
dir = "{{config_root}}"
usage = '''
arg "[contest_id]" help="contest id (e.g. 422 or abc422)"
'''
run = '''
set -eu
contest_id="${usage_contest_id:-}"

if [ -z "$contest_id" ]; then
  if [ -t 0 ]; then
    read -r -p "contest id (e.g. 422): " contest_id
  else
    echo "contest_id is required (e.g. 422)" >&2
    exit 1
  fi
fi

python3 scripts/setup_abc_contest.py "$contest_id"
'''
